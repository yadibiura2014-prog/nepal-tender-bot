name: Daily Economics Video
on:
  workflow_dispatch:
  schedule:
    - cron: '15 12 * * *' # नेपालको साँझ ६:०० बजे
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install ffmpeg -y
          pip install Pillow==10.3.0 moviepy==1.0.3 requests beautifulsoup4 edge-tts
          
      - name: Run Video Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python economics_video.py
        
      - name: Upload Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-economics-video
          path: economics_final.mp4
