name: Daily Tender Bot
on:
  schedule:
    - cron: '0 2 * * *' # Nepal ko bihano approx 7:45 tira aafai chalcha
  workflow_dispatch: # Manual test garna ko lagi button banaucha

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai requests

      - name: Run tender bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
